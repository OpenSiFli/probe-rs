name: Sync GitHub Release To SiFli CDN

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string
    secrets:
      COS_DOWNLOAD_SECRET_ID:
        required: false
      COS_DOWNLOAD_SECRET_KEY:
        required: false
      COS_DOWNLOAD_REGION:
        required: false
      COS_DOWNLOAD_BUCKET:
        required: false
      COS_DOWNLOAD_FLUSH_URL:
        required: false
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  actions: read
  contents: write

jobs:
  sync-release-assets:
    # The Release workflow runs for both PR validation and tag pushes.
    # Mirror sync must only follow the successful tag-push release runs.
    if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest
    env:
      COS_DOWNLOAD_SECRET_ID: ${{ secrets.COS_DOWNLOAD_SECRET_ID }}
      COS_DOWNLOAD_SECRET_KEY: ${{ secrets.COS_DOWNLOAD_SECRET_KEY }}
      COS_DOWNLOAD_REGION: ${{ secrets.COS_DOWNLOAD_REGION }}
      COS_DOWNLOAD_BUCKET: ${{ secrets.COS_DOWNLOAD_BUCKET }}
      COS_DOWNLOAD_FLUSH_URL: ${{ secrets.COS_DOWNLOAD_FLUSH_URL }}
      CDN_BASE: https://downloads.sifli.com/github_assets/${{ github.repository }}/releases/download/
    steps:
      - name: Resolve release tag
        run: |
          tag_name="${{ github.event.workflow_run.head_branch }}"
          if [[ -z "${tag_name}" ]]; then
            echo "Unable to determine tag name from workflow_run payload."
            exit 1
          fi
          echo "TAG_NAME=${tag_name}" >> "$GITHUB_ENV"

      - name: Check mirror sync configuration
        id: config
        run: |
          if [[ -n "${COS_DOWNLOAD_SECRET_ID}" && -n "${COS_DOWNLOAD_SECRET_KEY}" && -n "${COS_DOWNLOAD_REGION}" && -n "${COS_DOWNLOAD_BUCKET}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "SiFli mirror sync is skipped because COS secrets are not fully configured."
          fi

      - name: Download workflow artifacts
        if: ${{ steps.config.outputs.enabled == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p downloaded-artifacts
          gh run download "${{ github.event.workflow_run.id }}" --repo "${{ github.repository }}" --dir downloaded-artifacts

      - name: Merge dist release artifacts
        if: ${{ steps.config.outputs.enabled == 'true' }}
        run: |
          mkdir -p artifacts

          manifest_path="$(find downloaded-artifacts -name dist-manifest.json | head -n 1)"
          if [[ -z "${manifest_path}" ]]; then
            echo "Unable to find dist-manifest.json in downloaded artifacts"
            exit 1
          fi

          manifest_tag="$(jq -r '.announcement_tag // empty' "${manifest_path}")"
          if [[ -z "${manifest_tag}" ]]; then
            echo "Unable to determine announcement tag from ${manifest_path}"
            exit 1
          fi
          if [[ "${manifest_tag}" != "${TAG_NAME}" ]]; then
            echo "Release tag mismatch: workflow_run=${TAG_NAME}, manifest=${manifest_tag}"
            exit 1
          fi

          while IFS= read -r file; do
            name="$(basename "${file}")"
            destination="artifacts/${name}"
            if [[ -e "${destination}" ]]; then
              echo "Duplicate artifact name detected: ${name}"
              exit 1
            fi
            cp "${file}" "${destination}"
          done < <(find downloaded-artifacts -type f ! -name 'dist-manifest.json' ! -name '*-dist-manifest.json')

      - name: Rewrite installer download URLs to SiFli CDN
        if: ${{ steps.config.outputs.enabled == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const artifactsDir = 'artifacts';
            const cdnBase = process.env.CDN_BASE;
            const releasePattern = /https:\/\/github\.com\/.+?\/releases\/download\//g;

            for (const fileName of fs.readdirSync(artifactsDir)) {
              if (!/installer\.(sh|ps1)$/.test(fileName)) {
                continue;
              }

              const filePath = path.join(artifactsDir, fileName);
              const original = fs.readFileSync(filePath, 'utf8');
              const rewritten = original.replace(releasePattern, cdnBase);

              if (rewritten !== original) {
                fs.writeFileSync(filePath, rewritten, 'utf8');
                core.info(`Rewrote ${fileName}`);
              }
            }

      - name: Upload release assets to SiFli CDN tag directory
        if: ${{ steps.config.outputs.enabled == 'true' }}
        uses: OpenSiFli/SiFliMirrorSync@v1
        with:
          secret_id: ${{ env.COS_DOWNLOAD_SECRET_ID }}
          secret_key: ${{ env.COS_DOWNLOAD_SECRET_KEY }}
          region: ${{ env.COS_DOWNLOAD_REGION }}
          bucket: ${{ env.COS_DOWNLOAD_BUCKET }}
          prefix: github_assets/OpenSiFli/probe-rs/releases/download/${{ env.TAG_NAME }}/
          artifacts: .
          global: true
          delete_remote: true
          flush_url: ${{ env.COS_DOWNLOAD_FLUSH_URL }}
          working_directory: artifacts

      - name: Upload release assets to SiFli CDN latest directory
        if: ${{ steps.config.outputs.enabled == 'true' }}
        uses: OpenSiFli/SiFliMirrorSync@v1
        with:
          secret_id: ${{ env.COS_DOWNLOAD_SECRET_ID }}
          secret_key: ${{ env.COS_DOWNLOAD_SECRET_KEY }}
          region: ${{ env.COS_DOWNLOAD_REGION }}
          bucket: ${{ env.COS_DOWNLOAD_BUCKET }}
          prefix: github_assets/OpenSiFli/probe-rs/releases/download/latest/
          artifacts: .
          global: true
          delete_remote: true
          flush_url: ${{ env.COS_DOWNLOAD_FLUSH_URL }}
          working_directory: artifacts

      - name: Update GitHub release metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CDN_ENABLED: ${{ steps.config.outputs.enabled }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const repo = process.env.GITHUB_REPOSITORY;
            const tag = process.env.TAG_NAME;
            const cdnEnabled = process.env.CDN_ENABLED === 'true';
            const cdnBase = process.env.CDN_BASE;

            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag,
            });

            let body = release.body ?? '';
            if (cdnEnabled) {
              body = body.replace(/https:\/\/github\.com\/.+?\/releases\/download\//g, cdnBase);
            }
            body = body.replace(/--repo probe-rs\/probe-rs/g, `--repo ${repo}`);
            body = body.replace(
              /https:\/\/github\.com\/probe-rs\/probe-rs\/attestations/g,
              `https://github.com/${repo}/attestations`,
            );

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              body,
              prerelease: false,
            });
